<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* 顶部 */
.header{
background:#d6001c;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

/* 卡片 */
.card{
max-width:400px;
margin:40px auto;
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
}

/* 照片 */
.photo{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
}

/* 成绩 */
.score{
font-size:40px;
font-weight:bold;
color:#d6001c;
margin:10px 0;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#d6001c;
color:white;
text-decoration:none;
border-radius:5px;
}
</style>
</head>

<body>

<div class="header">ELTS Result</div>

<div class="card">

<!-- 这里换成你的照片 -->
<img src="your-photo.jpg" class="photo">

<h2>Your Name</h2>

<div class="score">6.5</div>

<p>Listening: 6.5</p>
<p>Reading: 6.0</p>
<p>Writing: 6.0</p>
<p>Speaking: 7.0</p>

<a href="index.html" class="btn">Back</a>

</div>

</body>
</html>
