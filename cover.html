<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELTS</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* 开场动画 */
.loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  letter-spacing: 8px;
  z-index: 999;
  animation: fadeOut 2s forwards;
  animation-delay: 2s;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

/* 顶部栏 */
.header {
  position: fixed;
  width: 100%;
  background: rgba(214,0,28,0.95);
  color: white;
  padding: 15px 20px;
  font-size: 22px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  z-index: 10;
}

/* 巴黎背景 */
.hero {
  height: 100vh;
  background: url("https://images.unsplash.com/photo-1502602898657-3e91760cbb34") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

/* 遮罩 */
.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

/* 内容 */
.content {
  position: relative;
  color: white;
}

/* 标题动画 */
h1 {
  font-size: 46px;
  font-weight: 900;
  line-height: 1.2;
  opacity: 0;
  transform: translateY(50px);
  animation: up 1s forwards;
  animation-delay: 2.2s;
}

@keyframes up {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 按钮 */
.btn {
  display: block;
  background: white;
  color: black;
  padding: 15px;
  margin: 15px auto;
  width: 260px;
  font-weight: bold;
  text-decoration: none;
  border: 2px solid black;
  opacity: 0;
  transform: translateY(50px);
  animation: up 1s forwards;
}

.btn:nth-child(2) { animation-delay: 2.6s; }
.btn:nth-child(3) { animation-delay: 3s; }

.btn:hover {
  background: black;
  color: white;
}
</style>
</head>

<body>

<!-- 开场 -->
<div class="loader">ELTS</div>

<!-- 顶部 -->
<div class="header">
  ELTS
  <span>☰</span>
</div>

<!-- 封面 -->
<div class="hero">
  <div class="content">
    <h1>
      The world's<br>
      most trusted<br>
      English test
    </h1>

    <a href="#" class="btn">Start Now →</a>
    <a href="#" class="btn">Learn More →</a>
  </div>
</div>

</body>
</html>
